name: ✅ AIモデル回答品質チェック
description: ベースモデルとファインチューニング済みモデルの回答品質を比較・確認します。
title: "✅ 品質チェック: "
labels: ["model-comparison"]
body:
  - type: textarea
    id: prompt
    attributes:
      label: Prompt
      description: The prompt to send to both models.
      placeholder: Enter your prompt here...
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: 参照回答
      description: |
        Saitekiが考える「S級人材」としての理想的な回答を入力してください。
        概要レベルで構いません。意味的類似度の算出基準として使用されます。
      placeholder: |
        例: まず相手の話をしっかり聞き、感情を受け止める。その後、モチベーションが下がっている背景にある要因を一緒に探る。単に励ますのではなく、業務の意義や期待を具体的に伝え、短期的な目標設定と支援策を提示する。
    validations:
      required: true

